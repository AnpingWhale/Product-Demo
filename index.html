<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Product Demo</title>
  <meta name="description" content="Internal product demo entry." />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <style>
    :root {
      --bg: #f7f7f8;
      --panel: rgba(255, 255, 255, 0.94);
      --line: #e6e8eb;
      --text: #202123;
      --text-dim: #6b7280;
      --accent: #111827;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #fcfcfd 0%, #f7f7f8 48%, #f1f3f5 100%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .entry {
      width: min(100%, 520px);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      padding: 28px;
      text-align: center;
    }

    .mark {
      width: 44px;
      height: 44px;
      margin: 0 auto 18px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    h1 {
      font-size: clamp(28px, 5vw, 38px);
      line-height: 1.08;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-dim);
      margin-bottom: 18px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="entry">
    <div class="mark">PD</div>
    <h1>Product Demo</h1>
    <p>内部演示入口。</p>
    <a href="./coros-mcp/">打开 Demo</a>
  </main>
</body>
</html>
